<section class="py-5">
  <div class="container">
    <div class="text-center mb-5">
      <h2 class="display-6 mb-3">Dlaczego my?</h2>
      <p class="text-muted">Zobacz co nas wyróżnia</p>
    </div>

    <div class="row g-4">
      <div
        class="col-md-6 col-lg-3"
        *ngFor="let v of values"
      >
        <div class="text-center p-4">
          <div class="value-icon rounded mx-auto mb-3">
            <i class="{{ v.icon }}"></i>
          </div>
          <h5>{{ v.title }}</h5>
          <p class="text-muted small mb-0">{{ v.text }}</p>
        </div>
      </div>
    </div>
  </div>
</section>
