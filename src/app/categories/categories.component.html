<section class="py-5 bg-light">
  <div class="container">
    <div class="text-center mb-5">
      <h2 class="display-6 mb-3">Nasze kategorie</h2>
      <p class="text-muted">Odkryj świeże produkty w każdej kategorii</p>
    </div>

    <div class="row g-4">
      <div class="col-md-4" *ngFor="let category of categories">
        <div class="card h-100 border-0 shadow-sm">
          <img [src]="category.img" class="card-img-top" [alt]="category.title" />
          <div class="card-body text-center">
            <i class="{{ category.icon }} fs-1 text-primary mb-3 d-block"></i>
            <h4 class="card-title">{{ category.title }}</h4>
            <p class="card-text text-muted">{{ category.text }}</p>
            <a class="btn btn-outline-primary" routerLink="/products">Zobacz produkty</a>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
